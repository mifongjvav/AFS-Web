<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>悼念 · 永恒的碑</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* 避免拖动/选中文字干扰感，但保留复制哀思可选 */
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #1a1e2a 0%, #0f1219 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Noto Serif SC', 'Times New Roman', '宋体', 'SimHei', serif;
            padding: 24px;
            margin: 0;
            position: relative;
        }

        /* 静谧气氛：暗花纹理 + 柔和光晕 */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(rgba(255,255,240,0.03) 1px, transparent 1px);
            background-size: 28px 28px;
            pointer-events: none;
            z-index: 0;
        }

        /* 主碑石容器 */
        .monument {
            position: relative;
            max-width: 620px;
            width: 100%;
            background: #2c2a2b;
            background-image: linear-gradient(135deg, #3a3637 0%, #201e1f 100%);
            border-radius: 42px 42px 48px 48px;
            box-shadow: 0 30px 45px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,240,0.08);
            padding: 2rem 1.8rem 3rem 1.8rem;
            transition: all 0.2s ease;
            border-bottom: 6px solid #6f4f37;
            border-top: 1px solid rgba(230,210,170,0.25);
            z-index: 2;
        }

        /* 仿石碑纹理 / 沧桑感 */
        .monument::after {
            content: "";
            position: absolute;
            top: 12px;
            left: 18px;
            right: 18px;
            bottom: 18px;
            background: repeating-linear-gradient(45deg, rgba(0,0,0,0.08) 0px, rgba(0,0,0,0.08) 2px, transparent 2px, transparent 8px);
            pointer-events: none;
            border-radius: 28px;
            opacity: 0.5;
        }

        /* 碑额 / 奠字 */
        .epitaph-header {
            text-align: center;
            margin-bottom: 32px;
            position: relative;
        }
        .memorial-icon {
            font-size: 2.8rem;
            letter-spacing: 6px;
            color: #cdb38c;
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
            font-weight: 400;
            background: rgba(0,0,0,0.3);
            display: inline-block;
            padding: 0 20px 6px 20px;
            border-radius: 60px;
            backdrop-filter: blur(1px);
        }
        .memorial-icon span {
            font-size: 2.2rem;
            font-family: 'Noto Serif SC', 'Times New Roman', serif;
        }

        /* 主体文字区域 */
        .inscription {
            text-align: center;
            padding: 10px 8px 18px 8px;
            background: rgba(0,0,0,0.2);
            border-radius: 38px;
            margin: 8px 0 10px 0;
            backdrop-filter: blur(1px);
        }

        /* 姓名 + 天数行 */
        .main-line {
            font-size: 1.9rem;
            font-weight: 500;
            color: #e9dfc7;
            text-shadow: 0 2px 3px #00000055;
            line-height: 1.45;
            word-break: break-word;
            white-space: pre-wrap;
            letter-spacing: 1px;
            margin-bottom: 28px;
            padding: 0 6px;
            border-left: 2px solid rgba(210,180,140,0.5);
            border-right: 2px solid rgba(210,180,140,0.5);
            display: inline-block;
            width: auto;
            max-width: 100%;
        }

        /* 节哀吧 单独样式 (比上面那行大) */
        .condolence {
            font-size: 3.2rem;
            font-weight: 600;
            color: #f5e7c8;
            text-shadow: 0 3px 6px #00000066;
            letter-spacing: 3px;
            margin-top: 12px;
            margin-bottom: 6px;
            word-break: keep-all;
            background: linear-gradient(135deg, #f2e2bc, #dac292);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 2px 8px rgba(0,0,0,0.3);
            /* 保留深色底纹同时凸显 */
            display: inline-block;
            width: auto;
        }

        /* 为保证“节哀吧”比上行文字明显大，根据屏幕缩放适配 */
        @media (max-width: 550px) {
            .main-line {
                font-size: 1.6rem;
            }
            .condolence {
                font-size: 2.8rem;
            }
            .monument {
                padding: 1.5rem 1.2rem 2.2rem 1.2rem;
            }
        }

        /* 辅助布局居中：碑文内部居中 */
        .text-center {
            text-align: center;
        }

        /* 底纹 / 蜡烛微光点缀 (宁静) */
        .candle-spirit {
            display: flex;
            justify-content: center;
            gap: 28px;
            margin-top: 28px;
            opacity: 0.55;
            font-size: 1.3rem;
            color: #b9a77d;
            letter-spacing: 2px;
        }

        /* 纪念日期/脚注 静谧 */
        .memorial-date {
            text-align: center;
            margin-top: 32px;
            font-size: 0.75rem;
            color: #8f836b;
            border-top: 1px solid rgba(160,130,90,0.4);
            padding-top: 18px;
            font-family: monospace;
            letter-spacing: 1px;
        }

        /* 全局变量名提示 : 优雅低调，不破坏氛围，可读但不大肆渲染 */
        .note-variable {
            text-align: center;
            font-size: 0.7rem;
            color: #9c8e72;
            margin-top: 20px;
            background: rgba(0,0,0,0.25);
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            padding: 4px 14px;
            border-radius: 30px;
            backdrop-filter: blur(2px);
        }

        /* 防止选中文本影响哀思，但保留基本交互 */
        .inscription, .condolence, .main-line {
            user-select: text;
        }

        /* 柔和呼吸灯效让碑文有微光 */
        @keyframes gentlePulse {
            0% { text-shadow: 0 2px 5px rgba(0,0,0,0.5); }
            100% { text-shadow: 0 3px 12px rgba(230,200,140,0.2); }
        }
        .condolence {
            animation: gentlePulse 3s infinite alternate ease-in-out;
        }
        .main-line {
            animation: gentlePulse 4s infinite alternate ease-in-out;
        }
    </style>
</head>
<body>

<div class="monument">
    <div class="epitaph-header">
        <div class="memorial-icon">
            <span>🕊️ 悼 🕊️</span>
        </div>
    </div>

    <div class="inscription">
        <div class="text-center">
            <div class="main-line" id="memorialText">
            </div>
            <div class="condolence" id="condolenceWord">
                节哀吧
            </div>
        </div>
    </div>

    <!-- 微光蜡烛意境 -->
    <div class="candle-spirit">
        <span>✧ 沉 思 ✧</span>
        <span>🕯️</span>
        <span>✧ 永 念 ✧</span>
    </div>
    
    <div class="memorial-date">
        <span id="currentDatePlaceholder"></span>
    </div>
    <div class="note-variable">
        🌿 铭 记 · 天 涯 若 比 邻 🌿
    </div>
</div>
<script>
    let nameVariable = "少年楷";
    const departureYear = 2026;
    const departureMonth = 2;
    const departureDay = 22;
    const departureDate = new Date(departureYear, departureMonth, departureDay);
    const today = new Date();
    const todayMidnight = new Date(today.getFullYear(), today.getMonth(), today.getDate());
    const departureMidnight = new Date(departureDate.getFullYear(), departureDate.getMonth(), departureDate.getDate());
    const timeDiff = todayMidnight - departureMidnight;
    let daysGone = Math.floor(timeDiff / (1000 * 60 * 60 * 24));
    if (daysGone < 0) {
        console.warn("⚠️ 警告: 设置的离世日期晚于当前日期，请检查 departureYear/Month/Day 是否正确。现暂时显示0天");
        daysGone = 0;
    }
    const mainLineElement = document.getElementById("memorialText");
    if (mainLineElement) {
        const mainSentence = `${nameVariable} 离开我们已经 ${daysGone} 天。`;
        mainLineElement.innerText = mainSentence;
    }
    const condolenceSpan = document.getElementById("condolenceWord");
    if (condolenceSpan) {
        condolenceSpan.innerText = "节哀吧";
    }
    const dateSpan = document.getElementById("currentDatePlaceholder");
    if (dateSpan) {
        const depYear = departureDate.getFullYear();
        const depMonthNum = departureDate.getMonth() + 1;
        const depDayNum = departureDate.getDate();
        const formattedDepart = `${depYear}.${depMonthNum}.${depDayNum}`;
        const todayYear = today.getFullYear();
        const todayMonth = today.getMonth() + 1;
        const todayDay = today.getDate();
        const formattedToday = `${todayYear}.${todayMonth}.${todayDay}`;
        dateSpan.innerHTML = `🕯️ 归 于 ${formattedDepart}  · 今 日 ${formattedToday}  · 遥 寄 哀 思 🕯️`;
    }
    window.__updateMemorial = function(newName, newDepartureDateObj = null) {
        if (newName !== undefined && typeof newName === 'string') {
            nameVariable = newName;
        }
        let targetDeparture = departureDate;
        if (newDepartureDateObj && newDepartureDateObj instanceof Date && !isNaN(newDepartureDateObj)) {
            targetDeparture = newDepartureDateObj;
        } else {
            targetDeparture = departureDate;
        }
        // 重新计算天数
        const nowDate = new Date();
        const nowMid = new Date(nowDate.getFullYear(), nowDate.getMonth(), nowDate.getDate());
        const depMid = new Date(targetDeparture.getFullYear(), targetDeparture.getMonth(), targetDeparture.getDate());
        let diffDays = Math.floor((nowMid - depMid) / (1000*3600*24));
        if (diffDays < 0) diffDays = 0;
        if (mainLineElement) {
            mainLineElement.innerText = `${nameVariable} 离开我们已经 ${diffDays} 天。`;
        }
        // 更新纪念脚注日期显示
        if (dateSpan) {
            const depY = targetDeparture.getFullYear();
            const depM = targetDeparture.getMonth()+1;
            const depD = targetDeparture.getDate();
            const todayY = nowDate.getFullYear();
            const todayM = nowDate.getMonth()+1;
            const todayD = nowDate.getDate();
            dateSpan.innerHTML = `🕯️ 归 于 ${depY}.${depM}.${depD}  · 今 日 ${todayY}.${todayM}.${todayD}  · 遥 寄 哀 思 🕯️`;
        }
        console.log(`🕯️ 碑文已更新: 为 ${nameVariable} 祈福，离去 ${diffDays} 天。`);
    };
    console.log(`%c🕊️ 沉痛悼念 ${nameVariable}  🕊️`, 'color: #cdb38c; font-size: 14px; font-weight: bold;');
    console.log(`%c${nameVariable} 离开我们已经 ${daysGone} 天。愿安息，节哀。`, 'color: #b8aa82; font-style: italic;');
    function adjustFontSizeForMobile() {
        if (window.innerWidth < 450) {
            const main = document.querySelector('.main-line');
            const con = document.querySelector('.condolence');
            if(main && con) {
                const mainSize = parseFloat(getComputedStyle(main).fontSize);
                const conSize = parseFloat(getComputedStyle(con).fontSize);
                if(conSize <= mainSize) {
                    con.style.fontSize = (mainSize * 1.5) + 'px';
                }
            }
        }
    }
    window.addEventListener('resize', () => adjustFontSizeForMobile());
    adjustFontSizeForMobile();
    const monument = document.querySelector('.monument');
    if(monument) {
        monument.addEventListener('mouseenter', () => {
            monument.style.transition = 'box-shadow 0.3s';
            monument.style.boxShadow = '0 35px 55px rgba(0,0,0,0.75), inset 0 1px 0 rgba(255,240,200,0.15)';
        });
        monument.addEventListener('mouseleave', () => {
            monument.style.boxShadow = '0 30px 45px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,240,0.08)';
        });
    }
    window.addEventListener('load', () => {
        console.log("%c若需更改名字，请修改变量 nameVariable 后刷新页面，或调用 __updateMemorial('新名字')", "color: #7f6e4e;");
    });
</script>
</body>
</html>
